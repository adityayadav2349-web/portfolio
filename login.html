<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome — Aditya Yadav</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:   #0a0a0f;
      --gold: #d4af5f;
      --muted:#9990a8;
    }

    body {
      background: var(--bg);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── PARTICLES ── */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0;
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { transform: translateY(110vh) scale(0); opacity: 0; }
      10%  { opacity: 0.5; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ── GLOW ── */
    .glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,175,95,.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: translate(-50%,-50%) scale(1);    opacity: .7; }
      50%      { transform: translate(-50%,-50%) scale(1.15); opacity: 1;  }
    }

    /* ── CARD ── */
    .card {
      position: relative; z-index: 10;
      text-align: center;
      padding: 4rem 3.5rem;
      border: 1px solid rgba(212,175,95,.18);
      background: rgba(15,15,22,.85);
      backdrop-filter: blur(20px);
      max-width: 520px; width: 90vw;
      animation: fadeUp .9s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 50%;
      transform: translateX(-50%);
      width: 80px; height: 2px;
      background: var(--gold);
    }

    .greeting {
      font-size: .75rem; font-weight: 500;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 1.2rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 400; line-height: 1.2;
      color: #f0ece4; margin-bottom: .8rem;
    }
    h1 em { color: var(--gold); font-style: italic; }

    .sub {
      font-size: .95rem; color: var(--muted);
      font-weight: 300; line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    /* ── ENTER BUTTON ── */
    .enter-btn {
      position: relative;
      display: inline-flex; align-items: center; gap: .7rem;
      padding: .9rem 2.6rem;
      border: 1px solid var(--gold); border-radius: 2px;
      background: transparent; color: var(--gold);
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem; font-weight: 600;
      letter-spacing: .16em; text-transform: uppercase;
      cursor: pointer; overflow: hidden;
      transition: color .3s, transform .3s;
    }
    .enter-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: var(--gold);
      transform: scaleX(0); transform-origin: left;
      transition: transform .35s ease; z-index: -1;
    }
    .enter-btn:hover::after,
    .enter-btn.active::after { transform: scaleX(1); }
    .enter-btn:hover,
    .enter-btn.active { color: #0a0a0f; transform: translateY(-2px); }
    .enter-btn:disabled { cursor: not-allowed; opacity: .8; }
    .btn-icon { font-size: 1.1rem; transition: transform .3s; }
    .enter-btn:hover .btn-icon { transform: rotate(20deg) scale(1.2); }

    /* ── COUNTDOWN ── */
    .countdown {
      display: none; margin-top: 2rem;
      flex-direction: column; align-items: center; gap: .6rem;
    }
    .countdown.show { display: flex; }

    .note {
      font-size: 1.6rem;
      animation: notePulse .8s ease-in-out infinite;
    }
    @keyframes notePulse {
      0%,100% { transform: scale(1) rotate(-10deg); opacity: .7; }
      50%      { transform: scale(1.3) rotate(10deg); opacity: 1; }
    }

    .music-label { font-size: .75rem; color: var(--muted); letter-spacing: .1em; }

    .count-num {
      font-family: 'Playfair Display', serif;
      font-size: 4.5rem; color: var(--gold);
      line-height: 1; animation: pop .4s ease;
    }
    @keyframes pop {
      0%   { transform: scale(1.5); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }

    .count-label {
      font-size: .7rem; letter-spacing: .2em;
      text-transform: uppercase; color: var(--muted);
    }

    .progress-wrap {
      width: 220px; height: 2px;
      background: rgba(212,175,95,.2);
      border-radius: 2px; overflow: hidden; margin-top: .4rem;
    }
    .progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #d4af5f, #f0d080);
      transition: width 10s linear;   /* ← 10 seconds */
    }
    .progress-bar.run { width: 100%; }
  </style>
</head>
<body>

  <div class="glow"></div>
  <div class="particles" id="particles"></div>

  <!-- 🎵 Apni audio file ka naam yahan likho -->
  <audio id="bgMusic">
    <source src="ladiesandget.mp3" type="audio/mpeg" />
  </audio>

  <div class="card">
    <div class="greeting">Welcome to my portfolio</div>
    <h1>Hi, I'm <em>Aditya</em><br />Yadav</h1>
    <p class="sub"> I am a developer crafting clean, modern &amp; responsive experiences.<br />Click below to enter.</p>

    <button class="enter-btn" id="enterBtn" onclick="startEntry()">
      <span class="btn-icon">♪</span>
      Enter Portfolio
    </button>

    <div class="countdown" id="countdown">
      <span class="note">♫</span>
      <span class="music-label">Ladies and Gentlemen you are not ready for this</span>
      <div class="count-num" id="countNum">10</div>
      <div class="count-label">seconds</div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>
  </div>

  <script>
    


    const wrap = document.getElementById('particles');
    for (let i = 0; i < 35; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 4 + 2;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random() * 100}%;
        animation-duration:${6 + Math.random() * 10}s;
        animation-delay:${Math.random() * 8}s;
      `;
      wrap.appendChild(p);
    }

    /* ── ENTRY FLOW ── */
    function startEntry() {
      const btn   = document.getElementById('enterBtn');
      const audio = document.getElementById('bgMusic');

      btn.classList.add('active');
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-icon">♫</span> Playing...';

      // audio play karo
      audio.volume = 0.8;
      audio.play().catch(() => {
        console.log('Audio file nahi mili — file ka naam check karo.');
      });

      // countdown dikhao
      document.getElementById('countdown').classList.add('show');

      // progress bar
      requestAnimationFrame(() => {
        document.getElementById('progressBar').classList.add('run');
      });

      // 10 second countdown
      let secs = 10;
      const numEl = document.getElementById('countNum');

      const tick = setInterval(() => {
        secs--;
        numEl.style.animation = 'none';
        void numEl.offsetWidth; // reflow for re-trigger
        numEl.style.animation = 'pop .4s ease';
        numEl.textContent = secs;

        if (secs <= 0) {
          clearInterval(tick);
          // mark karo ke intro dekh liya
          sessionStorage.setItem('introSeen', 'true');
          // fade out karke portfolio open karo
          document.body.style.transition = 'opacity .8s ease';
          document.body.style.opacity = '0';
          setTimeout(() => { window.location.href = 'portfolio.html'; }, 800);
        }
      }, 1000);
    }
  </script>
</body>
</html>
